<style>
/* ============================================================
     DESIGN TOKENS
     Subject: a personal memory tool. Direction: "index card / lab
     notebook" — paper warmth, ink, a single signature ledger-red.
     Display face: Fraunces (optical serif). Body: Newsreader.
     Mono/utility: Spline Sans Mono. Risk: the review card is a
     physical-feeling index card that flips in 3D.
     ============================================================ */
  :root{
    --paper:#F3EEE3;        /* warm card stock              */
    --paper-2:#EAE3D4;      /* slightly deeper panel        */
    --ink:#23201B;          /* near-black warm ink          */
    --ink-soft:#5C564B;     /* muted ink                    */
    --line:#CDC4B0;         /* hairline ruling              */
    --ledger:#B23A2E;       /* signature ledger red         */
    --ledger-2:#8E2C22;     /* darker red                   */
    --teal:#2E6E63;         /* "good" accent                */
    --gold:#B8862F;         /* "hard" accent                */
    --shadow:rgba(35,32,27,.16);
    --radius:3px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Newsreader",Georgia,serif;
    font-size:17px;
    line-height:1.55;
    /* faint ruled-paper texture */
    background-image:
      linear-gradient(transparent 27px, rgba(178,58,46,.05) 28px),
      linear-gradient(90deg, transparent 39px, rgba(46,110,99,.06) 40px, transparent 41px);
    background-size:100% 28px, 100% 100%;
  }
  #root{min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px;width:100%}

  /* ---------- masthead ---------- */
  header.masthead{
    border-bottom:2px solid var(--ink);
    background:var(--paper);
    position:sticky;top:0;z-index:30;
  }
  .masthead .wrap{display:flex;align-items:center;gap:28px;padding-top:14px;padding-bottom:14px}
  .brand{display:flex;align-items:baseline;gap:10px;text-decoration:none;color:var(--ink)}
  .brand .mark{
    font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:-.02em;
    line-height:1;
  }
  .brand .mark em{color:var(--ledger);font-style:italic}
  .brand .tag{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);border-left:1px solid var(--line);padding-left:10px}
  nav.tabs{display:flex;gap:2px;margin-left:auto}
  nav.tabs a{
    text-decoration:none;color:var(--ink-soft);
    font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:8px 14px;border:1px solid transparent;border-radius:var(--radius);
    transition:background .15s,color .15s;
  }
  nav.tabs a:hover{color:var(--ink);background:var(--paper-2)}
  nav.tabs a.active{color:var(--paper);background:var(--ink)}

  main{flex:1;padding:36px 0 80px}

  /* ---------- typography helpers ---------- */
  h1.page{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,4.5vw,46px);letter-spacing:-.02em;margin:0 0 6px;line-height:1.05}
  .eyebrow{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ledger);margin-bottom:10px}
  .lede{color:var(--ink-soft);max-width:60ch;margin:0 0 28px}
  .mono{font-family:"Spline Sans Mono",monospace}

  /* ---------- buttons ---------- */
  button,.btn{font-family:"Spline Sans Mono",monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;border:1px solid var(--ink);background:var(--paper);color:var(--ink);padding:9px 16px;border-radius:var(--radius);transition:transform .08s, background .15s, color .15s}
  button:hover,.btn:hover{background:var(--ink);color:var(--paper)}
  button:active{transform:translateY(1px)}
  button.primary{background:var(--ledger);border-color:var(--ledger);color:#fff}
  button.primary:hover{background:var(--ledger-2);border-color:var(--ledger-2)}
  button.ghost{border-color:var(--line);color:var(--ink-soft)}
  button.ghost:hover{background:var(--paper-2);color:var(--ink)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  /* ---------- cards / panels ---------- */
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 1px 0 var(--shadow)}
  .grid{display:grid;gap:18px}
  @media(min-width:720px){.grid.cols-2{grid-template-columns:1fr 1fr}.grid.cols-3{grid-template-columns:repeat(3,1fr)}}

  /* deck row */
  .deck-row{display:flex;align-items:center;gap:18px;padding:16px 0;border-bottom:1px solid var(--line)}
  .deck-row:last-child{border-bottom:none}
  .deck-name{font-family:"Fraunces",serif;font-size:22px;font-weight:500;letter-spacing:-.01em}
  .deck-name a{color:var(--ink);text-decoration:none}
  .deck-name a:hover{color:var(--ledger)}
  .deck-meta{margin-left:auto;display:flex;gap:14px;align-items:center}
  .pill{font-family:"Spline Sans Mono",monospace;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line)}
  .pill.due{color:var(--ledger);border-color:var(--ledger)}
  .pill.new{color:var(--teal);border-color:var(--teal)}

  /* ---------- the signature: index card ---------- */
  .study-stage{perspective:1600px;margin:10px 0 26px}
  .index-card{
    position:relative;min-height:300px;border-radius:6px;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);
    cursor:pointer;
  }
  .index-card.flipped{transform:rotateX(180deg)}
  .index-card .face{
    position:absolute;inset:0;backface-visibility:hidden;
    background:linear-gradient(180deg,#FBF7EE,#F3EEE3);
    border:1px solid var(--line);border-radius:6px;
    box-shadow:0 18px 40px -22px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.4);
    padding:54px 40px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    /* red margin line + holes, like a real card */
    background-image:linear-gradient(90deg,transparent 46px,rgba(178,58,46,.35) 47px,transparent 48px);
  }
  .index-card .face.back{transform:rotateX(180deg)}
  .index-card .face::before{content:"";position:absolute;left:20px;top:20px;width:11px;height:11px;border-radius:50%;background:var(--paper);box-shadow:inset 0 1px 2px var(--shadow)}
  .card-side-label{position:absolute;top:16px;right:18px;font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
  .card-text{font-family:"Fraunces",serif;font-size:clamp(22px,3.6vw,32px);font-weight:500;line-height:1.25;max-width:30ch}
  .card-sub{margin-top:14px;color:var(--ink-soft);font-size:16px;max-width:46ch}
  .card-extra{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);max-width:42ch;width:100%;display:flex;flex-direction:column;gap:6px}
  .card-extra .ex-line{font-size:14px;color:var(--ink-soft);line-height:1.45}
  .card-extra .ex-label{font-family:"Spline Sans Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-right:8px;opacity:.85}
  [dir="rtl"]{text-align:right}
  [dir="rtl"].ex-line .ex-label{margin-right:0;margin-left:8px}
  .flip-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);opacity:.8}

  .answer-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .answer-bar button{min-width:120px;display:flex;flex-direction:column;gap:2px;align-items:center;padding:10px 14px}
  .answer-bar .ivl{font-size:10px;opacity:.7}
  button.again{border-color:var(--ledger);color:var(--ledger)}
  button.again:hover{background:var(--ledger);color:#fff}
  button.hard{border-color:var(--gold);color:var(--gold)}
  button.hard:hover{background:var(--gold);color:#fff}
  button.good{border-color:var(--teal);color:var(--teal)}
  button.good:hover{background:var(--teal);color:#fff}
  button.easy{border-color:var(--ink);color:var(--ink)}

  /* progress ticker */
  .ticker{display:flex;gap:18px;justify-content:center;font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--ink-soft);margin-bottom:8px}
  .ticker b{color:var(--ink)}
  .ticker .t-again{color:var(--ledger)}
  .ticker .t-good{color:var(--teal)}

  /* ---------- table ---------- */
  table{width:100%;border-collapse:collapse;font-size:15px}
  th{text-align:left;font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);padding:10px 12px;border-bottom:2px solid var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--ink)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:var(--paper-2)}
  .row-actions button{padding:5px 9px;font-size:10px}
  .truncate{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filter-input,input.txt,textarea.txt,select.txt{font-family:"Newsreader",serif;font-size:15px;width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius);background:#FBF7EE;color:var(--ink)}
  textarea.txt{min-height:96px;resize:vertical;line-height:1.5}
  label.field{display:block;margin-bottom:14px}
  label.field .lab{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;display:block}
  .err{color:var(--ledger);font-size:12px;font-family:"Spline Sans Mono",monospace;margin-top:4px}

  /* ---------- stats ---------- */
  .stat{padding:20px}
  .stat .n{font-family:"Fraunces",serif;font-size:42px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .stat .l{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px}
  .stat .n.red{color:var(--ledger)} .stat .n.teal{color:var(--teal)} .stat .n.gold{color:var(--gold)}
  .bars{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:10px}
  .bar{flex:1;background:var(--teal);border-radius:2px 2px 0 0;min-height:2px;position:relative;transition:height .4s}
  .bar:hover{background:var(--ledger)}
  .bar .cap{position:absolute;top:-18px;left:0;right:0;text-align:center;font-family:"Spline Sans Mono",monospace;font-size:10px;color:var(--ink-soft);opacity:0}
  .bar:hover .cap{opacity:1}
  .bar .lab{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-family:"Spline Sans Mono",monospace;font-size:9px;color:var(--ink-soft)}

  /* ---------- toolbar / misc ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
  .toolbar .spacer{flex:1}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
  .empty .big{font-family:"Fraunces",serif;font-size:26px;color:var(--ink);margin-bottom:8px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:"Spline Sans Mono",monospace;font-size:12px;padding:12px 20px;border-radius:var(--radius);z-index:100;box-shadow:0 8px 24px -8px var(--shadow)}
  .modal-bg{position:fixed;inset:0;background:rgba(35,32,27,.45);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--paper);border:1px solid var(--ink);border-radius:var(--radius);max-width:560px;width:100%;padding:26px;max-height:90vh;overflow:auto;box-shadow:0 30px 60px -20px var(--shadow)}
  .modal h2{font-family:"Fraunces",serif;font-weight:600;margin:0 0 4px}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .choice-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .choice{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;transition:border-color .15s,background .15s}
  .choice:hover{background:var(--paper-2)}
  .choice.sel{border-color:var(--ledger);background:#FBF7EE}
  .choice.disabled{opacity:.5;cursor:not-allowed}
  .choice input[type="radio"]{margin-top:3px;accent-color:var(--ledger)}
  .choice-title{font-family:"Fraunces",serif;font-size:17px;font-weight:500}
  .choice-sub{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .loading{display:flex;align-items:center;justify-content:center;min-height:70vh;font-family:"Spline Sans Mono",monospace;color:var(--ink-soft);letter-spacing:.1em;text-transform:uppercase;font-size:12px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ledger);margin-left:8px;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .hidden{display:none}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>

<body>
  <div id="root"></div>
  <script type="module">
import React, { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } from "react";
import { createRoot } from "react-dom/client";
import { QueryClient, QueryClientProvider, useQuery } from "@tanstack/react-query";
import { useReactTable, getCoreRowModel, getSortedRowModel, getFilteredRowModel, flexRender } from "@tanstack/react-table";
import { useForm } from "@tanstack/react-form";
import { createRootRoute, createRoute, createRouter, createHashHistory, RouterProvider, Outlet, Link, useNavigate, useRouterState } from "@tanstack/react-router";
import initSqlJs from "sql.js";
import JSZip from "jszip";

/* =========================================================================
   1. SQLITE LAYER — sql.js, a full SQLite engine compiled to WASM, running
   entirely in the browser. We seed a DB, persist its bytes to localStorage,
   can export it to a .sqlite file, and can import an Anki .apkg.
   ========================================================================= */
const DB = {
  SQL: null,
  db: null,
  async init() {
    this.SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
    });
    const saved = localStorage.getItem("recall.db");
    if (saved) {
      try {
        this.db = new this.SQL.Database(b64ToBytes(saved));
        this._schema();
        return;
      } catch (e) {
        console.warn("reload failed, reseeding", e);
      }
    }
    this.db = new this.SQL.Database();
    this._schema();
    this._seed();
    this.persist();
  },
  _schema() {
    this.db.run(`
      CREATE TABLE IF NOT EXISTS decks(
        id INTEGER PRIMARY KEY, name TEXT NOT NULL, created INTEGER);
      CREATE TABLE IF NOT EXISTS cards(
        id INTEGER PRIMARY KEY, deck_id INTEGER, front TEXT, back TEXT, extra TEXT,
        ease REAL DEFAULT 2.5, interval INTEGER DEFAULT 0, reps INTEGER DEFAULT 0,
        lapses INTEGER DEFAULT 0, due INTEGER, created INTEGER);
      CREATE TABLE IF NOT EXISTS reviews(
        id INTEGER PRIMARY KEY, card_id INTEGER, ts INTEGER, rating INTEGER, interval INTEGER);
    `);
    // migrate older saved DBs that predate the `extra` column
    const cols = this.all("PRAGMA table_info(cards)").map(c => c.name);
    if (!cols.includes("extra")) this.db.run("ALTER TABLE cards ADD COLUMN extra TEXT");
  },
  _seed() {
    const now = Date.now();
    [["Spanish · A1 vocabulary"], ["World capitals"], ["Biology · the cell"]].forEach(([n], i) => this.db.run("INSERT INTO decks(id,name,created) VALUES(?,?,?)", [i + 1, n, now]));
    const cards = [[1, "la casa", "the house"], [1, "el perro", "the dog"], [1, "comer", "to eat"], [1, "el agua", "the water"], [1, "gracias", "thank you"], [1, "mañana", "tomorrow / morning"], [1, "la biblioteca", "the library"], [1, "feliz", "happy"], [2, "Capital of Japan", "Tokyo"], [2, "Capital of Australia", "Canberra"], [2, "Capital of Canada", "Ottawa"], [2, "Capital of Brazil", "Brasília"], [2, "Capital of Egypt", "Cairo"], [2, "Capital of Norway", "Oslo"], [3, "Powerhouse of the cell", "Mitochondrion"], [3, "Site of protein synthesis", "Ribosome"], [3, "Controls what enters / leaves the cell", "Cell membrane"], [3, "Stores genetic material", "Nucleus"]];
    let id = 1;
    cards.forEach(([d, f, b], i) => {
      const due = i % 3 === 0 ? now - 86400000 : i % 3 === 1 ? now : now + 2 * 86400000;
      const reps = i % 3 === 0 ? 2 : 0;
      this.db.run("INSERT INTO cards(id,deck_id,front,back,ease,interval,reps,lapses,due,created) VALUES(?,?,?,?,?,?,?,?,?,?)", [id++, d, f, b, 2.5, reps ? 3 : 0, reps, 0, due, now]);
    });
    for (let day = 13; day >= 0; day--) {
      const n = Math.floor(Math.random() * 9) + (day < 3 ? 6 : 1);
      for (let k = 0; k < n; k++) {
        const ts = now - day * 86400000 - Math.floor(Math.random() * 8e6);
        this.db.run("INSERT INTO reviews(card_id,ts,rating,interval) VALUES(?,?,?,?)", [1 + Math.floor(Math.random() * 18), ts, 1 + Math.floor(Math.random() * 4), 1]);
      }
    }
  },
  all(sql, params = []) {
    const r = this.db.exec(sql, params);
    if (!r.length) return [];
    const {
      columns,
      values
    } = r[0];
    return values.map(row => Object.fromEntries(row.map((v, i) => [columns[i], v])));
  },
  one(sql, params = []) {
    return this.all(sql, params)[0] || null;
  },
  run(sql, params = []) {
    this.db.run(sql, params);
    this.persist();
  },
  persist() {
    localStorage.setItem("recall.db", bytesToB64(this.db.export()));
  }
};
function bytesToB64(bytes) {
  let bin = "";
  const c = 0x8000;
  for (let i = 0; i < bytes.length; i += c) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + c));
  return btoa(bin);
}
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

/* =========================================================================
   2. SRS — SM-2 scheduling (the algorithm Anki is built on)
   ratings: 1 Again · 2 Hard · 3 Good · 4 Easy
   ========================================================================= */
const DAY = 86400000;
function schedule(card, rating) {
  let {
    ease = 2.5,
    interval = 0,
    reps = 0,
    lapses = 0
  } = card;
  if (rating === 1) {
    reps = 0;
    lapses += 1;
    ease = Math.max(1.3, ease - 0.2);
    interval = 0;
    return {
      ease,
      interval,
      reps,
      lapses,
      due: Date.now() + 60 * 1000
    };
  }
  if (reps === 0) interval = rating === 4 ? 3 : 1;else if (reps === 1) interval = rating === 2 ? 3 : rating === 3 ? 4 : 6;else {
    const mult = rating === 2 ? 1.2 : rating === 3 ? ease : ease * 1.3;
    interval = Math.max(1, Math.round(interval * mult));
  }
  if (rating === 2) ease = Math.max(1.3, ease - 0.15);
  if (rating === 4) ease = ease + 0.15;
  reps += 1;
  return {
    ease: +ease.toFixed(2),
    interval,
    reps,
    lapses,
    due: Date.now() + interval * DAY
  };
}
function previewIvl(card, rating) {
  const s = schedule({
    ...card
  }, rating);
  if (rating === 1) return "<1m";
  if (s.interval < 1) return "today";
  if (s.interval === 1) return "1d";
  if (s.interval < 30) return s.interval + "d";
  if (s.interval < 365) return Math.round(s.interval / 30) + "mo";
  return (s.interval / 365).toFixed(1) + "y";
}

// detect Persian / Arabic script so we can render those lines right-to-left
const RTL_RE = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
const dirOf = s => RTL_RE.test(String(s || "")) ? "rtl" : "ltr";

/* =========================================================================
   3. DATA ACCESS (consumed by TanStack Query)
   ========================================================================= */
const api = {
  decks() {
    return DB.all(`SELECT d.id, d.name,
      (SELECT COUNT(*) FROM cards c WHERE c.deck_id=d.id) AS total,
      (SELECT COUNT(*) FROM cards c WHERE c.deck_id=d.id AND c.reps=0) AS fresh,
      (SELECT COUNT(*) FROM cards c WHERE c.deck_id=d.id AND c.due<=${Date.now()}) AS due
      FROM decks d ORDER BY d.name`);
  },
  deck(id) {
    return DB.one("SELECT * FROM decks WHERE id=?", [id]);
  },
  cards(deckId) {
    return DB.all("SELECT * FROM cards WHERE deck_id=? ORDER BY id", [deckId]);
